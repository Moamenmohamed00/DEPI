<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - LinkVault</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Style/Global/base.css">
    <link rel="stylesheet" href="../Style/components/from.css">

    <style>
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .note-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .actions button {
            margin-right: 5px;
        }

        .pinned {
            border-left: 5px solid gold;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Notes</h1>

    <!-- Filters -->
    <div>
        <input type="text" id="searchWord" placeholder="Search..." />
        <label>
            <input type="checkbox" id="pinnedFilter" /> Pinned Only
        </label>
        <button onclick="applyFilters()">Apply</button>
    </div>

    <br>

    <!-- Add Note -->
    <form id="noteForm">
        <input type="text" id="title" placeholder="Title" required />
        <textarea id="content" placeholder="Content" required></textarea>
        <input type="number" id="categoryId" placeholder="Category ID" required />
        <button type="submit">Add</button>
    </form>

    <br>

    <!-- Notes List -->
    <div id="notesList"></div>

</div>

<!-- JS -->
<script src="../JS/Pages/Notes.js"></script>

</body>
</html>
