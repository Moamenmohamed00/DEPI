<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Notes - LinkVault</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Style/Global/base.css">
    <link rel="stylesheet" href="../Style/components/from.css">

    <style>
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .note-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .actions button {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Bookmark Notes</h1>

    <!-- Add Note -->
    <form id="noteForm">
        <textarea id="content" placeholder="Write a note..." required></textarea>
        <button type="submit">Add Note</button>
    </form>

    <!-- Notes List -->
    <div id="notesList"></div>

    <!-- Back -->
    <br>
    <a href="bookmark.html">⬅ Back to Bookmarks</a>

</div>

<!-- JS -->
<script src="../JS/Pages/bookmark-notes.js"></script>

</body>
</html>
