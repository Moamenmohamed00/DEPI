<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - LinkVault</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Style/Global/base.css">
    <link rel="stylesheet" href="../Style/components/from.css">

    <style>
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .filters {
            margin-bottom: 15px;
        }

        .bookmark-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .actions button {
            margin-right: 5px;
        }

        a.link {
            display: block;
            margin-top: 5px;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Bookmarks</h1>

    <!-- Filters -->
    <div class="filters">
        <input type="text" id="search" placeholder="Search..." />
        <label>
            <input type="checkbox" id="favorite" /> Favorite
        </label>
        <label>
            <input type="checkbox" id="archived" /> Archived
        </label>
        <button onclick="applyFilters()">Apply</button>
    </div>

    <!-- Add Bookmark -->
    <form id="bookmarkForm">
        <input type="text" id="title" placeholder="Title" required />
        <input type="url" id="url" placeholder="URL" required />
        <input type="number" id="categoryId" placeholder="Category ID" required />
        <button type="submit">Add</button>
    </form>

    <!-- List -->
    <div id="bookmarkList"></div>

</div>

<!-- JS -->
<script src="../JS/Pages/bookmark.js"></script>

</body>
</html>
