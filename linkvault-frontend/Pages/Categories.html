<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - LinkVault</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Style/Global/base.css">
    <link rel="stylesheet" href="../Style/components/from.css">
    <link rel="stylesheet" href="../Style/components/navbar.css">
    <link rel="stylesheet" href="../Style/components/card.css">


    <style>
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .category-list {
            margin-top: 20px;
        }

        .category-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions button {
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <a href="bookmark-note.html">>Bookmarks-Notes</a>
    <a href="bookmark.html">Bookmarks</a>
    <a href="notes.html">Notes</a>
</div>
<div class="container">

    <h1>Categories</h1>

    <!-- Add Category -->
    <form id="categoryForm">
        <input type="text" id="categoryName" placeholder="Category Name" required />
        <input type="text" id="description" placeholder="Description (optional)" />
        <button type="submit">Add</button>
    </form>

    <!-- Categories List -->
    <div class="category-list" id="categoryList"></div>

</div>

<!-- JS -->
<script src="../JS/Pages/Categories.js"></script>

</body>
</html>
